quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=import.sql

%prod.quarkus.datasource.username=quarkus_test
%prod.quarkus.datasource.password=quarkus_test
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost/quarkus_test
%prod.quarkus.hibernate-orm.schema-management.strategy=create

%dev.quarkus.http.port=8089

# MCP Server Info (exposed to clients)
quarkus.mcp.server.server-info.name=Complaint Management MCP Server
quarkus.mcp.server.server-info.version=1.0.0
quarkus.mcp.server.server-info.description=MCP Server for managing customer complaints

# CORS for MCP (required by MCP HTTP server)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:6274

# # OAuth2/OIDC Configuration
# quarkus.oidc.auth-server-url=http://localhost:9080/realms/internal-globex
# quarkus.oidc.client-id=claude-users
# quarkus.oidc.token.audience=mcp-server
# quarkus.oidc.credentials.secret=<your-client-secret>

# Enable OAuth2 resource metadata for auto-discovery
quarkus.oidc.resource-metadata.enabled=true
quarkus.oidc.resource-metadata.force-https-scheme=false

# Authentication enforcement on MCP endpoints
quarkus.http.auth.permission.authenticated.paths=/mcp/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Traffic logging for debugging
quarkus.mcp.server.traffic-logging.enabled=true
quarkus.mcp.server.traffic-logging.text-limit=1000

